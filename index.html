<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPIc 과거형 드릴 | Past Tense Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3a;
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --text-primary: #e8f0f2;
            --text-secondary: #8b95a5;
            --error: #ff4757;
            --success: #00ff88;
            --border: #2d3550;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(100, 100, 255, 0.03) 0%, transparent 50%);
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, #00ccff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out 0.2s both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .score-item {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s ease;
        }

        .score-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .score-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .question-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #00ccff);
        }

        .question-number {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .question-text {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .question-korean {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-style: italic;
        }

        .sentence-practice {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--accent-dim);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .sentence-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.8rem;
        }

        .sentence-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .blank {
            color: var(--accent);
            font-weight: 700;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-decoration-color: var(--accent-dim);
        }

        .verb-hint {
            font-family: 'Space Mono', monospace;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .countdown-timer {
            text-align: center;
            margin: 2rem 0;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .timer-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto 1rem;
            background: var(--bg-primary);
            border: 4px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 255, 136, 0); }
        }

        .timer-number {
            font-family: 'Space Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .timer-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .answer-reveal {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
            animation: revealPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes revealPop {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .reveal-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
        }

        .reveal-answer {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
            font-family: 'Space Mono', monospace;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .reveal-forms {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .reveal-hint {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 0.8rem 1.5rem;
            background: var(--bg-primary);
            border-radius: 8px;
            display: inline-block;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--accent-dim);
        }

        @media (max-width: 640px) {
            .container {
                padding: 2rem 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .score-board {
                gap: 1rem;
            }

            .score-item {
                padding: 0.8rem 1.2rem;
            }

            .question-card {
                padding: 1.5rem;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>OPIc Past Tense Drill</h1>
            <p class="subtitle">100개 불규칙 동사 × 20개 기출문장 완벽 정복</p>
        </header>

        <div class="score-board">

            <div class="score-item">

        </div>

        <div class="question-card" id="questionCard">

            <div class="question-text" id="questionText"></div>
            <div class="question-korean" id="questionKorean"></div>
            
            <div class="sentence-practice">

            </div>

            <div class="countdown-timer" id="countdown">

                    <div class="timer-number" id="timerNumber">3</div>
                </div>
                <div class="timer-label">초 후 정답 공개</div>
            </div>

            <div class="answer-reveal" id="answerReveal" style="display: none;">
                <div class="reveal-label">정답</div>
                <div class="reveal-answer" id="revealAnswer"></div>
                <div class="reveal-forms" id="revealForms"></div>
                <div class="reveal-hint">스페이스바를 눌러 다음 문제로 →</div>
            </div>
        </div>

        <footer>
            <p>Made with Claude × OPIc 실전 기출 | <a href="https://dailyupdate.co.kr" target="_blank">dailyupdate.co.kr</a></p>
        </footer>
    </div>

            {
                question: "Tell me about an experience when you panicked because a gadget or computer broke down.",
                korean: "전자기기나 컴퓨터가 고장 나서 당황했던 경험을 말해 주세요.",
                sentences: [
                    {template: "My laptop screen ___ (go) completely black.", verb: "go", answer: "went"},
                    {template: "I ___ (shake) the computer hoping it would work.", verb: "shake", answer: "shook"},
                    {template: "Eventually, I ___ (send) it to a repair shop.", verb: "send", answer: "sent"}
                ]
            },
            {
                question: "Describe the situation when you first met your best friend.",
                korean: "가장 친한 친구를 처음 만났을 때의 상황을 묘사해 주세요.",
                sentences: [
                    {template: "We ___ (stand) next to each other in class.", verb: "stand", answer: "stood"},
                    {template: "She ___ (say) something funny and I laughed.", verb: "say", answer: "said"},
                    {template: "We ___ (become) close friends instantly.", verb: "become", answer: "became"}
                ]
            },
            {
                question: "Tell me about an experience where you were dissatisfied or had a problem at a restaurant.",
                korean: "식당에서 불만족스러웠거나 문제가 있었던 경험을 말해 주세요.",
                sentences: [
                    {template: "The waiter ___ (bring) the wrong dish to our table.", verb: "bring", answer: "brought"},
                    {template: "I ___ (tell) him about the mistake politely.", verb: "tell", answer: "told"},
                    {template: "They ___ (make) a new one and apologized.", verb: "make", answer: "made"}
                ]
            },
            {
                question: "If you have a memorable incident that happened at a cafe, please tell me about it.",
                korean: "카페에서 있었던 잊지 못할 에피소드가 있다면 이야기해 주세요.",
                sentences: [
                    {template: "I ___ (drink) my coffee too fast and burned my tongue.", verb: "drink", answer: "drank"},
                    {template: "The barista ___ (give) me some cold water.", verb: "give", answer: "gave"},
                    {template: "I ___ (feel) embarrassed but grateful.", verb: "feel", answer: "felt"}
                ]
            },
            {
                question: "Tell me about an unexpected situation you encountered while shopping.",
                korean: "쇼핑을 하다가 겪었던 예상치 못한 상황에 대해 말해 주세요.",
                sentences: [
                    {template: "I ___ (choose) a shirt but it was the wrong size.", verb: "choose", answer: "chose"},
                    {template: "The cashier ___ (sell) me the last one they had.", verb: "sell", answer: "sold"},
                    {template: "I ___ (think) I'd exchange it later.", verb: "think", answer: "thought"}
                ]
            },
            {
                question: "Tell me about a time when you were late for an appointment or had to cancel it.",
                korean: "약속 시간에 늦거나 약속을 취소해야 했던 경험에 대해 이야기해 주세요.",
                sentences: [
                    {template: "I ___ (oversleep) and woke up 30 minutes late.", verb: "oversleep", answer: "overslept"},
                    {template: "I ___ (throw) on my clothes and rushed out.", verb: "throw", answer: "threw"},
                    {template: "I ___ (ride) my bike as fast as I could.", verb: "ride", answer: "rode"}
                ]
            },
            {
                question: "When was your most memorable holiday from your childhood, and what happened?",
                korean: "어릴 적 가장 기억에 남는 명절이나 휴일은 언제였으며, 무슨 일이 있었나요?",
                sentences: [
                    {template: "My family ___ (hold) a big reunion during Chuseok.", verb: "hold", answer: "held"},
                    {template: "We ___ (eat) delicious traditional food together.", verb: "eat", answer: "ate"},
                    {template: "I ___ (wear) a hanbok for the first time.", verb: "wear", answer: "wore"}
                ]
            },
            {
                question: "Tell me in detail about the most surprising, sad, or happy thing you experienced recently.",
                korean: "최근에 겪은 가장 놀랍거나 슬펐거나 기뻤던 일에 대해 자세히 말해 주세요.",
                sentences: [
                    {template: "I ___ (win) a small lottery prize last week.", verb: "win", answer: "won"},
                    {template: "I ___ (sing) and danced when I found out.", verb: "sing", answer: "sang"},
                    {template: "I ___ (understand) that luck can strike anytime.", verb: "understand", answer: "understood"}
                ]
            }
        ];

        // 게임 상태
        let currentQuestionIndex = 0;
        let currentSentenceIndex = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let usedVerbs = new Set();
        let allSentences = [];

        // 모든 문장을 평평하게 펼치기
        questions.forEach(q => {
            q.sentences.forEach(s => {
                allSentences.push({
                    ...s,
                    question: q.question,
                    korean: q.korean
                });
            });
        });

        // 셔플 함수
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 문장 셔플
        allSentences = shuffle(allSentences);

        // DOM 요소
        const questionNumber = document.getElementById('questionNumber');
        const questionText = document.getElementById('questionText');
        const questionKorean = document.getElementById('questionKorean');
        const sentenceText = document.getElementById('sentenceText');
        const countdown = document.getElementById('countdown');
        const timerNumber = document.getElementById('timerNumber');
        const answerReveal = document.getElementById('answerReveal');
        const revealAnswer = document.getElementById('revealAnswer');
        const revealForms = document.getElementById('revealForms');
        const correctDisplay = document.getElementById('correct');
        const incorrectDisplay = document.getElementById('incorrect');
        const progressDisplay = document.getElementById('progress');

        let countdownInterval;
        let timeLeft = 3;

        // 현재 문제 로드
        function loadQuestion() {
            if (currentSentenceIndex >= allSentences.length) {
                showComplete();
                return;
            }

            const current = allSentences[currentSentenceIndex];
            
            questionNumber.textContent = `Question ${currentSentenceIndex + 1} / ${allSentences.length}`;
            questionText.textContent = current.question;
            questionKorean.textContent = current.korean;
            
            // 문장에서 동사 부분을 하이라이트
            const highlighted = current.template.replace(
                `___ (${current.verb})`,
                `<span class="blank">___</span> <span class="verb-hint">(${current.verb})</span>`
            );
            sentenceText.innerHTML = highlighted;

            // UI 리셋
            countdown.style.display = 'block';
            answerReveal.style.display = 'none';
            timeLeft = 3;
            timerNumber.textContent = timeLeft;

            // 애니메이션 리셋
            document.querySelector('.question-card').style.animation = 'none';
            setTimeout(() => {
                document.querySelector('.question-card').style.animation = 'slideUp 0.5s ease-out';
            }, 10);

            // 카운트다운 시작
            startCountdown();
        }

        // 카운트다운 시작
        function startCountdown() {
            clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                timerNumber.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    revealAnswer();
                }
            }, 1000);
        }

        // 정답 공개
        function revealAnswer() {
            const current = allSentences[currentSentenceIndex];
            const verbData = verbs.find(v => v.base === current.verb);

            countdown.style.display = 'none';
            answerReveal.style.display = 'block';
            
            revealAnswer.textContent = current.answer;
            revealForms.textContent = `${verbData.base} - ${verbData.past} - ${verbData.pp}`;

            usedVerbs.add(current.verb);
            correctCount++; // 스피킹 연습이므로 모두 정답으로 카운트
            
            correctDisplay.textContent = correctCount;
            progressDisplay.textContent = `${usedVerbs.size}/100`;
        }

        // 다음 문제
        function nextQuestion() {
            currentSentenceIndex++;
            loadQuestion();
        }

        // 완료 화면
        function showComplete() {
            questionNumber.textContent = '🎉 완료!';
            questionText.textContent = `총 ${allSentences.length}개 문장 완료!`;
            questionKorean.textContent = `학습한 동사: ${usedVerbs.size}개`;
            sentenceText.innerHTML = '<strong>수고하셨습니다!</strong> 다시 도전하려면 페이지를 새로고침하세요.';
            
            countdown.style.display = 'none';
            answerReveal.style.display = 'none';
            
            const completeMsg = document.createElement('div');
            completeMsg.className = 'answer-reveal';
            completeMsg.innerHTML = `
                <div class="reveal-label">🏆 학습 완료</div>
                <div class="reveal-answer" style="font-size: 1.5rem;">OPIc AL 목표를 향해<br>한 걸음 더 가까워졌습니다!</div>
            `;
            document.querySelector('.question-card').appendChild(completeMsg);
        }

        // 스페이스바 이벤트
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && answerReveal.style.display === 'block') {
                e.preventDefault();
                nextQuestion();
            }
        });

        // 초기 로드
        loadQuestion();
        }); // DOMContentLoaded 끝
    </script>
</body>
</html>
